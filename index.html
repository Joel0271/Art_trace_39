<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trace App</title>

<style>
body {
  margin: 0;
  background: #111;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* Camera container */
#app {
  position: relative;
  width: 100vw;
  height: 100vh;
}

/* Camera feed */
video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Overlay image */
#overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(1) rotate(0deg);
  max-width: 80%;
  max-height: 80%;
  pointer-events: none;
}

/* Control panel */
#controls {
  position: absolute;
  bottom: 0;
  width: 100%;
  background: rgba(0,0,0,0.39);
  color: #40E0D0;
  padding: 15px;
  box-sizing: border-box;
  transition: transform 0.3s;
}

/* Collapse */
#controls.collapsed {
  transform: translateY(85%);
}

/* Toggle button */
#toggleBtn {
  position: absolute;
  top: -25px;
  left: 50%;
  transform: translateX(-50%);
  background: black;
  color: #40E0D0;
  border: 2px solid #40E0D0;
  border-radius: 10px;
  padding: 2px 10px;
  cursor: pointer;
}

/* Sliders */
input[type=range] {
  width: 100%;
}

/* Buttons container */
.btns {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

/* Custom buttons */
.btn {
  width: 50px;
  height: 50px;
  background-size: cover;
  background-position: center;
  border: none;
  cursor: pointer;
}

/* Hide input */
#fileInput {
  display: none;
}

label {
  font-size: 14px;
}
</style>
</head>

<body>

<div id="app">
  <video id="camera" autoplay playsinline></video>
  <img id="overlay">

  <div id="controls">
    <button id="toggleBtn">⌃</button>

    <label>Size</label>
    <input type="range" id="size" min="0" max="100" value="50">

    <label>Alpha</label>
    <input type="range" id="alpha" min="0" max="100" value="50">

    <div class="btns">
      <!-- BT1 (Upload) -->
      <button class="btn" id="bt1"></button>

      <!-- BT2 (Rotate) -->
      <button class="btn" id="bt2"></button>
    </div>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*">

<script>
const video = document.getElementById("camera");
const overlay = document.getElementById("overlay");

const sizeSlider = document.getElementById("size");
const alphaSlider = document.getElementById("alpha");

const bt1 = document.getElementById("bt1");
const bt2 = document.getElementById("bt2");

const fileInput = document.getElementById("fileInput");

let scale = 1;
let rotation = 0;

/* =========================
   CAMERA
========================= */
navigator.mediaDevices.getUserMedia({
  video: {
    facingMode: "environment"
  }
})
.then(stream => {
  video.srcObject = stream;
})
.catch(err => {
  alert("Camera access denied");
});

/* =========================
   IMAGE UPLOAD (BT1)
========================= */
bt1.onclick = () => fileInput.click();

fileInput.onchange = (e) => {
  const file = e.target.files[0];
  if (file) {
    overlay.src = URL.createObjectURL(file);
  }
};

/* =========================
   ROTATE (BT2)
========================= */
bt2.onclick = () => {
  rotation += 90;
  if (rotation >= 360) rotation = 0;
  updateTransform();
};

/* =========================
   SLIDERS
========================= */
sizeSlider.oninput = () => {
  scale = sizeSlider.value / 50; // normalize
  updateTransform();
};

alphaSlider.oninput = () => {
  overlay.style.opacity = alphaSlider.value / 100;
};

/* =========================
   TRANSFORM UPDATE
========================= */
function updateTransform() {
  overlay.style.transform =
    `translate(-50%, -50%) scale(${scale}) rotate(${rotation}deg)`;
}

/* =========================
   COLLAPSIBLE PANEL
========================= */
const controls = document.getElementById("controls");
const toggleBtn = document.getElementById("toggleBtn");

toggleBtn.onclick = () => {
  controls.classList.toggle("collapsed");
};

/* =========================
   CUSTOM BUTTON IMAGES
   (REPLACE THESE FILES)
========================= */
bt1.style.backgroundImage = "url('bt1.png')";
bt2.style.backgroundImage = "url('bt2.png')";

</script>

</body>
</html>
